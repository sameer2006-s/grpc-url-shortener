name: CI

on:
push:
branches:
- main
- develop

pull_request:

jobs:
test:

```
runs-on: ubuntu-latest

steps:

  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Go
    uses: actions/setup-go@v5
    with:
      go-version: "1.26"

  - name: Download dependencies
    run: go mod download

  - name: Format check
    run: |
      if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
        echo "Code is not formatted"
        gofmt -l .
        exit 1
      fi

  - name: Vet
    run: go vet ./...

  - name: Run tests
    run: go test ./...

  - name: Build link-service
    run: go build ./services/link-service

  - name: Build api-service
    run: go build ./services/api-service

  - name: Build Docker images
    run: docker compose build
```
